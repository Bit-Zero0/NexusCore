services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus_code
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - nexus-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus_code"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:latest
    container_name: nexus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - nexus-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: nexus-rabbitmq
    restart: unless-stopped
    command:
      - /bin/sh
      - -lc
      - rabbitmq-plugins enable --offline rabbitmq_prometheus && rabbitmq-server
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    volumes:
      - nexus-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  nats:
    image: nats:latest
    container_name: nexus-nats
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nexus-nats-data:/data

  nats-exporter:
    image: natsio/prometheus-nats-exporter:0.19.2
    container_name: nexus-nats-exporter
    restart: unless-stopped
    command:
      - "-varz"
      - "-connz"
      - "-routez"
      - "-subz"
      - "-jsz=streams"
      - "http://nats:8222"
    depends_on:
      - nats

  prometheus:
    image: prom/prometheus:latest
    container_name: nexus-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - nexus-prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - alertmanager
      - rabbitmq
      - nats
      - nats-exporter

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: nexus-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    depends_on:
      - alert-relay

  alert-relay:
    build:
      context: .
      dockerfile: ./monitoring/alert-relay/Dockerfile
    container_name: nexus-alert-relay
    restart: unless-stopped
    environment:
      NEXUS_ALERT_WEBHOOK_URL: ${NEXUS_ALERT_WEBHOOK_URL:-}
      NEXUS_ALERT_FEISHU_WEBHOOK_URL: ${NEXUS_ALERT_FEISHU_WEBHOOK_URL:-}
      NEXUS_ALERT_WECOM_WEBHOOK_URL: ${NEXUS_ALERT_WECOM_WEBHOOK_URL:-}
      NEXUS_ALERT_RELAY_BIND_ADDR: 0.0.0.0:18081
    ports:
      - "18081:18081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.1.0
    container_name: nexus-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - nexus-grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  nexus-postgres-data:
  nexus-redis-data:
  nexus-rabbitmq-data:
  nexus-nats-data:
  nexus-prometheus-data:
  nexus-grafana-data:
