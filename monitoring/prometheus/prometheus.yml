global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: "nexus-app"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "host.docker.internal:8080"
        labels:
          service: nexus-app

  - job_name: "rabbitmq"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "rabbitmq:15692"
        labels:
          service: rabbitmq

  - job_name: "nats-exporter"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "nats-exporter:7777"
        labels:
          service: nats-exporter

  - job_name: "alertmanager"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "alertmanager:9093"
        labels:
          service: alertmanager
